name: pdf_app
description: PDFアプリ
version: 1.0.3+5
publish_to: none

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状態管理
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^3.1.0

  # ナビゲーション
  go_router: ^14.6.1

  # PDF ビューア
  pdfrx: ^1.0.0

  # ファイル・ストレージ
  path_provider: ^2.1.5
  file_picker: ^8.0.0
  shared_preferences: ^2.5.5

  # ネットワーク・ダウンロード
  dio: ^5.7.0
  background_downloader: ^9.0.0
  screen_protector: ^1.5.2

  # ローカルPush通知
  flutter_local_notifications: '>=16.3.0 <17.0.0'
  timezone: ^0.9.4

  # Firebase
  firebase_core: ^2.27.0
  firebase_analytics: ^10.10.0

  # WebView
  flutter_inappwebview: ^6.1.5

  # テキスト認識・読み上げ
  google_mlkit_text_recognition: ^0.13.0
  flutter_tts: ^4.2.0

  # 開発用モックサーバー
  mock_server:
    path: ./mock_server

dev_dependencies:
  # テスト
  flutter_test:
    sdk: flutter

  # アイコン生成
  flutter_launcher_icons: ^0.14.3

  # コード生成
  build_runner: ^2.4.15
  freezed: ^3.0.6
  riverpod_generator: ^2.6.5

  # Lint
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/originals/diagonal_mask.png
    - assets/images/originals/skyward_cover.png
    - assets/images/originals/kochi_katsuo.jpg
    - assets/images/originals/local_chain_ramen.jpg
    - assets/images/originals/sora_gourmet_aomori.jpg
    - assets/images/originals/ichiro_malt.jpg
    - assets/images/originals/minami_aso.jpg
    - assets/images/originals/sora_gourmet_memanbetsu.jpg
    - assets/images/originals/shop_single.png
    - assets/images/originals/shop_lohme.png
    - assets/images/originals/shop_famillea.png
    - assets/images/originals/shop_toystory.png
    - assets/images/originals/shop_unagi.jpg
    - assets/images/originals/shop_iphone.jpg
    - assets/images/originals/shop_curry.jpg
    - assets/images/originals/shop_skytime.jpg
    - assets/images/originals/pickup_carlease.jpg
    - assets/images/originals/pickup_okamoto_sanbashi.jpg
    - assets/images/originals/jalshop_catalog.png
    - assets/images/originals/banner_zennoh_chicken.png
    - assets/images/originals/torimeshi_kagoshima.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
